<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="py-32 px-6 lg:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-2">
                <a href="account.html" class="block bg-red-500 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Profile</a>
                <a href="orders.html" class="block hover:bg-white/5 text-gray-400 hover:text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Orders</a>
                <button onclick="logout()" class="w-full text-left hover:bg-red-500/10 text-red-400 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all mt-10">Logout</button>
            </div>

            <!-- Content -->
            <div class="lg:col-span-3">
                <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
                    <h2 class="text-3xl font-bold font-['Syncopate'] uppercase tracking-tight mb-8">Profile Settings</h2>
                    
                    <div class="space-y-8">
                        <div class="flex items-center gap-6">
                            <div class="w-24 h-24 bg-red-500 rounded-full flex items-center justify-center text-3xl font-bold uppercase" id="avatarChar">U</div>
                            <div>
                                <h3 class="text-xl font-bold" id="profileName">User Name</h3>
                                <p class="text-gray-500" id="profileEmail">user@email.com</p>
                            </div>
                        </div>

                        <form class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-8 border-t border-white/10">
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold ml-1">Update Name</label>
                                <input type="text" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-red-500 transition-all text-white placeholder:text-white/10">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold ml-1">Update Email</label>
                                <input type="email" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-red-500 transition-all text-white placeholder:text-white/10">
                            </div>
                            <button type="button" class="md:col-span-2 bg-white/10 hover:bg-white text-black hover:text-black py-4 rounded-2xl font-bold uppercase tracking-widest text-sm transition-all mt-4">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('profileName').innerText = user.name;
            document.getElementById('profileEmail').innerText = user.email;
            document.getElementById('avatarChar').innerText = user.name.charAt(0);
        });
    </script>
</body>
</html>
