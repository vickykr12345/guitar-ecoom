<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="py-32 px-6 lg:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-2">
                <a href="account.html" class="block hover:bg-white/5 text-gray-400 hover:text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Profile</a>
                <a href="orders.html" class="block bg-red-500 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Orders</a>
                <button onclick="logout()" class="w-full text-left hover:bg-red-500/10 text-red-400 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all mt-10">Logout</button>
            </div>

            <!-- Content -->
            <div class="lg:col-span-3">
                <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
                    <h2 class="text-3xl font-bold font-['Syncopate'] uppercase tracking-tight mb-8">Order History</h2>
                    
                    <div id="ordersList" class="space-y-6">
                        <div class="text-center py-20 text-white/20">
                            <i class="bi bi-bag-x text-6xl mb-4 block"></i>
                            <p class="font-bold uppercase tracking-widest text-xs">No orders found</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
        });
    </script>
</body>
</html>
