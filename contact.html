<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Custom | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050505] text-white font-['Lexend']">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[60vh] flex flex-col items-center justify-center text-center px-6 pt-20">
        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">START <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">YOUR</span> BUILD</h1>
            <p class="text-white/50 text-xl max-w-2xl mx-auto">Ready to bring your dream instrument to life? Let's talk craft.</p>
        </div>
        <!-- Background Gradient -->
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(255,45,85,0.15),transparent_70%)]"></div>
    </section>

    <section class="contact-page-content py-20">
        <div class="container mx-auto px-6">
            <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-[2rem] overflow-hidden shadow-2xl">
                <div class="grid grid-cols-1 lg:grid-cols-2">
                    <!-- Contact Info -->
                    <div class="p-8 md:p-12 lg:p-16 bg-gradient-to-br from-[#ff2d55]/20 to-transparent">
                        <h2 class="text-4xl md:text-5xl font-['Syncopate'] font-bold mb-6">Reach <span class="text-[#ff2d55]">Out</span></h2>
                        <p class="text-white/60 text-lg mb-10 leading-relaxed">Whether it's a custom build inquiry or general support, our team of experts is ready to help.</p>
                        
                        <div class="space-y-6">
                            <div class="flex items-center gap-6 group">
                                <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-[#ff2d55] transition-colors duration-300">
                                    <i class="bi bi-geo-alt text-xl"></i>
                                </div>
                                <span class="text-white/80">Studio 42, Neon District, Nashville TN</span>
                            </div>
                            <div class="flex items-center gap-6 group">
                                <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-[#ff2d55] transition-colors duration-300">
                                    <i class="bi bi-envelope text-xl"></i>
                                </div>
                                <span class="text-white/80">craft@stringtheory.com</span>
                            </div>
                            <div class="flex items-center gap-6 group">
                                <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-[#ff2d55] transition-colors duration-300">
                                    <i class="bi bi-phone text-xl"></i>
                                </div>
                                <span class="text-white/80">+1 (888) 555-ROCK</span>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="p-8 md:p-12 lg:p-16 bg-black/40">
                        <form id="contactForm" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold ml-1">Full Name</label>
                                    <input type="text" id="contactName" placeholder="e.g. Jimi Hendrix" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-red-500 transition-colors text-white placeholder:text-white/10">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold ml-1">Email Address</label>
                                    <input type="email" id="contactEmail" placeholder="jimi@strat.com" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-red-500 transition-colors text-white placeholder:text-white/10">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold ml-1">Subject</label>
                                <select id="contactSubject" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-red-500 transition-colors text-white/50 appearance-none">
                                    <option value="" disabled selected>Interested in...</option>
                                    <option value="custom" class="bg-black text-white">Custom Build</option>
                                    <option value="shop" class="bg-black text-white">Shop Inquiry</option>
                                    <option value="support" class="bg-black text-white">Support</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold ml-1">Your Message</label>
                                <textarea id="contactMessage" placeholder="Tell us about your dream guitar..." rows="5" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-red-500 transition-colors text-white placeholder:text-white/10 resize-none"></textarea>
                            </div>
                            <button type="submit" id="contactSubmitBtn" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl uppercase tracking-widest shadow-lg shadow-red-500/20 transition-all active:scale-[0.98]">
                                Send Inquiry
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.getElementById('contactForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('contactSubmitBtn');
            btn.disabled = true;
            btn.innerText = 'Sending...';

            try {
                // Simulate API Call
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                if (window.showToast) {
                    window.showToast('Inquiry sent successfully!');
                } else {
                    alert('Message sent! Our team will reach out soon.');
                }
                e.target.reset();
            } catch (err) {
                alert('Error sending message.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send Inquiry';
            }
        });
    </script>
</body>
</html>
