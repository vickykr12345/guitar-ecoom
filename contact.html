<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Custom | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="hero secondary-hero">
        <div class="hero-content">
            <h1>START <span>YOUR</span> BUILD</h1>
            <p>Ready to bring your dream instrument to life? Let's talk craft.</p>
        </div>
    </section>

    <section class="contact-page-content">
        <div class="container py-5">
            <div class="glass-card contact-wrapper">
                <div class="contact-info">
                    <h2>Reach <span>Out</span></h2>
                    <p>Whether it's a custom build inquiry or general support, our team of experts is ready to help.</p>
                    <div class="contact-item">
                        <i class="bi bi-geo-alt"></i>
                        <span>Studio 42, Neon District, Nashville TN</span>
                    </div>
                    <div class="contact-item">
                        <i class="bi bi-envelope"></i>
                        <span>craft@stringtheory.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="bi bi-phone"></i>
                        <span>+1 (888) 555-ROCK</span>
                    </div>
                </div>
                <form class="contact-form">
                    <div class="form-group">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <select required>
                            <option value="" disabled selected>Interested in...</option>
                            <option value="custom">Custom Build</option>
                            <option value="shop">Shop Inquiry</option>
                            <option value="support">Support</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Tell us about your dream guitar..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn primary-btn w-100">Send Inquiry</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="js/script.js"></script>
</body>
</html>
