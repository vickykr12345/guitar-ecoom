<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="navbar"></div>

    <section class="relative min-h-[40vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-5xl md:text-7xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">CHECK<span class="text-red-500">OUT</span></h1>
            <p class="text-white/50 text-lg max-w-2xl mx-auto">Complete your order.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2">
                <div class="bg-white/5 border border-white/10 p-8 rounded-2xl">
                    <h3 class="text-xl font-bold mb-6 uppercase tracking-widest">Shipping</h3>
                    <form class="space-y-4">
                        <input type="text" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none">
                        <input type="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none">
                        <input type="text" placeholder="Address" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none">
                    </form>
                </div>
            </div>
            <div>
                <div class="bg-white/5 border border-white/10 p-8 rounded-2xl sticky top-32">
                    <h3 class="text-xl font-bold mb-6">Summary</h3>
                    <div id="checkout-items" class="space-y-4 mb-6"></div>
                    <div class="border-t border-white/10 pt-4 flex justify-between font-bold text-xl">
                        <span>Total</span><span id="summary-total" class="text-red-500">$0.00</span>
                    </div>
                    <button onclick="placeOrder()" class="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-full font-bold uppercase mt-8 transition-all">Place Order</button>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/ui.js"></script>
    <script>
        function loadCheckout() {
            const cart = getCart();
            const container = document.getElementById('checkout-items');
            const totalEl = document.getElementById('summary-total');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `<div class="flex justify-between text-sm"><span>${item.name} x${item.quantity}</span><span>$${(item.price * item.quantity).toLocaleString()}</span></div>`;
            }).join('');
            totalEl.innerText = `$${total.toLocaleString()}`;
        }
        function placeOrder() {
            alert('Order placed successfully!');
            setCart([]);
            window.location.href = 'index.html';
        }
        document.addEventListener('DOMContentLoaded', loadCheckout);
    </script>
</body>
</html>
