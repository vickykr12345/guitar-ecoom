<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[40vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-5xl md:text-7xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">CHECK<span class="text-red-500">OUT</span></h1>
            <p class="text-white/50 text-lg max-w-2xl mx-auto">Complete your order and start your sonic journey.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <!-- Left: Billing/Shipping Form -->
                <div class="lg:col-span-2 space-y-8">
                    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8 shadow-2xl">
                        <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">
                            <span class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-sm">1</span>
                            Shipping Information
                        </h3>
                        <form id="checkout-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">Full Name</label>
                                    <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="John Doe">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">Email Address</label>
                                    <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="john@example.com">
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">Phone Number</label>
                                    <input type="tel" id="phone" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="+1 (555) 000-0000">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">Country</label>
                                    <select id="country" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors appearance-none">
                                        <option value="US" class="bg-black">United States</option>
                                        <option value="UK" class="bg-black">United Kingdom</option>
                                        <option value="CA" class="bg-black">Canada</option>
                                        <option value="AU" class="bg-black">Australia</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">Shipping Address</label>
                                <input type="text" id="address" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="Street Address, Apt, Suite">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">City</label>
                                    <input type="text" id="city" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="Nashville">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">State</label>
                                    <input type="text" id="state" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="TN">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold ml-1">Zip Code</label>
                                    <input type="text" id="zip" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 transition-colors placeholder:text-white/10" placeholder="37201">
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8 shadow-2xl">
                        <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">
                            <span class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-sm">2</span>
                            Payment Method (UI Only)
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-4 border border-red-500 bg-red-500/10 rounded-xl flex items-center justify-between cursor-pointer">
                                <div class="flex items-center gap-3">
                                    <i class="bi bi-credit-card-2-back text-2xl"></i>
                                    <span class="font-bold">Credit Card</span>
                                </div>
                                <i class="bi bi-check-circle-fill text-red-500"></i>
                            </div>
                            <div class="p-4 border border-white/10 bg-white/5 rounded-xl flex items-center justify-between cursor-pointer opacity-50 grayscale">
                                <div class="flex items-center gap-3">
                                    <i class="bi bi-paypal text-2xl"></i>
                                    <span class="font-bold">PayPal</span>
                                </div>
                                <div class="w-5 h-5 rounded-full border border-white/10"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Order Summary -->
                <div class="space-y-8">
                    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8 shadow-2xl sticky top-32">
                        <h3 class="text-xl font-bold mb-6 font-['Syncopate'] uppercase tracking-tight">Order Summary</h3>
                        
                        <div id="checkout-items" class="space-y-4 mb-8 max-h-[400px] overflow-y-auto pr-2">
                            <!-- Items will be injected here -->
                        </div>

                        <div class="space-y-3 border-t border-white/10 pt-6 mb-8">
                            <div class="flex justify-between text-gray-400 text-sm">
                                <span>Subtotal</span>
                                <span id="summary-subtotal">$0.00</span>
                            </div>
                            <div class="flex justify-between text-gray-400 text-sm">
                                <span>Shipping</span>
                                <span class="text-green-500">FREE</span>
                            </div>
                            <div class="flex justify-between text-white font-bold text-xl pt-2">
                                <span>Total</span>
                                <span id="summary-total" class="text-red-500">$0.00</span>
                            </div>
                        </div>

                        <button onclick="placeOrder()" class="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all duration-300 hover:scale-[1.05] shadow-lg shadow-red-500/30">
                            Place Order
                        </button>
                        
                        <p class="text-[10px] text-gray-500 text-center mt-6 uppercase tracking-widest leading-relaxed">
                            By placing your order, you agree to StringTheory's <br>
                            <a href="#" class="underline">Terms of Service</a> and <a href="#" class="underline">Privacy Policy</a>.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderSummary();
        });

        function renderSummary() {
            const container = document.getElementById('checkout-items');
            const subtotalEl = document.getElementById('summary-subtotal');
            const totalEl = document.getElementById('summary-total');
            const cart = getCart();
            
            if (!container) return;

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-white/40">Your cart is empty</p>';
                return;
            }

            let subtotal = 0;
            container.innerHTML = cart.map(item => {
                subtotal += item.price * item.quantity;
                return `
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white/5 rounded-lg overflow-hidden border border-white/10">
                                <img src="${item.image}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h4 class="text-white text-xs font-bold line-clamp-1">${item.name}</h4>
                                <p class="text-gray-500 text-[10px]">QTY: ${item.quantity}</p>
                            </div>
                        </div>
                        <span class="text-white text-xs font-bold">$${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            subtotalEl.innerText = `$${subtotal.toLocaleString()}`;
            totalEl.innerText = `$${subtotal.toLocaleString()}`;
        }

        async function placeOrder() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const cart = getCart();
            
            if (!name || !email) {
                alert('Please fill in the required fields.');
                return;
            }

            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            // Simulate API Call
            const btn = event.target;
            btn.disabled = true;
            btn.innerText = 'Processing...';

            setTimeout(() => {
                alert(`Thank you, ${name}! Your order has been placed successfully.`);
                setCart([]);
                window.location.href = 'index.html';
            }, 2000);
        }
    </script>
</body>
</html>
