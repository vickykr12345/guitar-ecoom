<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Shop | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[50vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">CUSTOM <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">SHOP</span></h1>
            <p class="text-white/50 text-xl max-w-2xl mx-auto">Build your dream instrument with our master builders.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12 max-w-7xl mx-auto">
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-[2rem] p-12 text-center">
            <h2 class="text-3xl font-bold mb-6">Your Vision, Our Craft</h2>
            <p class="text-gray-400 mb-10 max-w-2xl mx-auto">Every StringTheory custom guitar is a one-of-a-kind masterpiece. From rare tonewoods to bespoke inlays, we bring your musical identity to life.</p>
            <a href="contact.html" class="bg-red-500 hover:bg-red-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest transition-all">Start Your Build</a>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
