<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[40vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-5xl md:text-7xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">YOUR <span class="text-red-500">CART</span></h1>
            <p class="text-white/50 text-lg max-w-2xl mx-auto">Review your selected instruments and gear.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12">
        <div class="max-w-7xl mx-auto">
            <div id="emptyCart" class="hidden text-center py-20 bg-white/5 border border-white/10 rounded-[2rem] backdrop-blur-lg">
                <i class="bi bi-cart-x text-6xl text-white/20 mb-6 block"></i>
                <h2 class="text-2xl font-bold mb-4">Your cart is empty</h2>
                <p class="text-gray-500 mb-8">It looks like you haven't added any instruments yet.</p>
                <a href="shop.html" class="inline-block bg-red-500 hover:bg-red-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all shadow-lg shadow-red-500/20">Go Shopping</a>
            </div>

            <div id="cartContent" class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <!-- Cart Items -->
                <div class="lg:col-span-2 space-y-4" id="cartItems">
                    <!-- Items will be injected here -->
                </div>

                <!-- Order Summary -->
                <div class="space-y-8">
                    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8 shadow-2xl sticky top-32">
                        <h3 class="text-xl font-bold mb-6 font-['Syncopate'] uppercase tracking-tight">Order Summary</h3>
                        
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between text-gray-400 text-sm">
                                <span>Subtotal</span>
                                <span id="cartSubtotal">$0.00</span>
                            </div>
                            <div class="flex justify-between text-gray-400 text-sm">
                                <span>Shipping</span>
                                <span class="text-green-500 font-bold uppercase text-[10px]">Calculated at checkout</span>
                            </div>
                            <div class="h-[1px] bg-white/10 my-4"></div>
                            <div class="flex justify-between text-white font-bold text-2xl">
                                <span>Total</span>
                                <span id="cartTotal" class="text-red-500">$0.00</span>
                            </div>
                        </div>

                        <button onclick="window.location.href='checkout.html'" id="checkoutBtn" class="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all hover:scale-[1.05] shadow-lg shadow-red-500/30">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCartPage();
            // Sync if tab storage changes
            window.addEventListener('storage', loadCartPage);
            // Re-run if cart changes via JS in same tab
            const originalSetItem = localStorage.setItem;
            localStorage.setItem = function() {
                originalSetItem.apply(this, arguments);
                if (arguments[0] === 'cart') loadCartPage();
            };
        });

        function loadCartPage() {
            const cart = getCart();
            const container = document.getElementById('cartItems');
            const emptyState = document.getElementById('emptyCart');
            const contentState = document.getElementById('cartContent');
            const subtotalEl = document.getElementById('cartSubtotal');
            const totalEl = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                emptyState.classList.remove('hidden');
                contentState.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            contentState.classList.remove('hidden');

            let total = 0;
            container.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-6 p-6 bg-white/5 border border-white/10 rounded-2xl transition-all hover:bg-white/[0.07]">
                        <div class="flex items-center gap-6 w-full sm:w-auto">
                            <div class="w-24 h-24 bg-black rounded-xl overflow-hidden border border-white/10 flex-shrink-0">
                                <img src="${item.image}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1">
                                <h4 class="text-white font-bold text-lg mb-1">${item.name}</h4>
                                <p class="text-red-400 font-bold">$${item.price.toLocaleString()}</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between w-full sm:w-auto gap-12">
                            <div class="flex items-center bg-black/50 rounded-full border border-white/10 px-3 py-1.5">
                                <button onclick="updatePageQuantity('${item.id}', ${item.quantity - 1})" class="text-white/40 hover:text-white px-2 text-xl">-</button>
                                <span class="text-white text-sm font-bold px-4 w-8 text-center">${item.quantity}</span>
                                <button onclick="updatePageQuantity('${item.id}', ${item.quantity + 1})" class="text-white/40 hover:text-white px-2 text-xl">+</button>
                            </div>
                            <div class="text-right min-w-[100px]">
                                <p class="text-white font-bold text-lg">$${itemTotal.toLocaleString()}</p>
                                <button onclick="removePageItem('${item.id}')" class="text-xs uppercase tracking-widest text-gray-500 hover:text-red-500 mt-1 transition-colors">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            subtotalEl.innerText = `$${total.toLocaleString()}`;
            totalEl.innerText = `$${total.toLocaleString()}`;
            checkoutBtn.disabled = total === 0;
        }

        window.updatePageQuantity = function(id, qty) {
            let cart = getCart();
            if (qty < 1) return removePageItem(id);
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity = qty;
                setCart(cart);
                loadCartPage();
            }
        };

        window.removePageItem = function(id) {
            let cart = getCart();
            cart = cart.filter(i => i.i !== id); // wait typo in original thought, item.id
            cart = cart.filter(i => i.id !== id);
            setCart(cart);
            loadCartPage();
        };
    </script>
</body>
</html>
