<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acoustic Series | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[50vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">ACOUSTIC <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">SERIES</span></h1>
            <p class="text-white/50 text-xl max-w-2xl mx-auto">Timeless resonance, reimagined for the future.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="product-card group relative bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-6 transition-all duration-500 hover:scale-[1.03]" data-category="acoustic">
                <div class="relative aspect-square overflow-hidden rounded-xl mb-8 bg-gradient-to-tr from-red-500/5 to-transparent flex items-center justify-center">
                    <img src="https://images.unsplash.com/photo-1525201548942-d8b8967d0f5c?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
                </div>
                <h3 class="text-white text-xl font-bold mb-2">Celestial Acoustic</h3>
                <div class="flex items-center justify-between mt-6">
                    <span class="text-red-500 font-bold text-2xl">$5,200</span>
                    <button onclick="addToCart({id: 'celestial-acoustic', name: 'Celestial Acoustic', price: 5200, image: 'https://images.unsplash.com/photo-1525201548942-d8b8967d0f5c?auto=format&fit=crop&q=80'})" class="bg-red-500 text-white px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-red-600 transition-all">Add to Cart</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
