<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shop | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="navbar"></div>

    <section class="relative min-h-[50vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">THE <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">VAULT</span></h1>
            <p class="text-white/50 text-xl max-w-2xl mx-auto">Your journey to perfect tone starts here. Explore our flagship models.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <!-- Shop Content -->
    <section class="relative bg-black py-20 px-6 lg:px-12 overflow-hidden">
        <div class="relative z-10 max-w-7xl mx-auto">
            <div class="mb-12">
                <div class="flex items-center gap-3">
                    <h2 class="text-white text-3xl md:text-4xl font-semibold">Best Prices</h2>
                    <div class="w-2 h-2 rounded-full bg-red-500 mt-2"></div>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3 mb-12">
                <button class="tab-btn px-6 py-2.5 bg-red-500 text-white rounded-full text-sm font-medium transition-all duration-300" data-category="electric">Electric</button>
                <button class="tab-btn px-6 py-2.5 bg-white/5 text-gray-300 rounded-full text-sm font-medium transition-all duration-300" data-category="acoustic">Acoustic</button>
                <button class="tab-btn px-6 py-2.5 bg-white/5 text-gray-300 rounded-full text-sm font-medium transition-all duration-300" data-category="all">All</button>
            </div>

            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Product Card 1 -->
                <div class="product-card group relative bg-white/5 border border-white/10 rounded-2xl p-5 transition-all duration-500 hover:scale-[1.03]" data-category="electric" data-name="The Obsidian Strat">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-xl mb-6 flex items-center justify-center">
                        <img src="https://images.unsplash.com/photo-1550291652-6ea9114a47b1?auto=format&fit=crop&q=80" class="relative z-10 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <h3 class="text-white font-medium text-lg mb-1">The Obsidian Strat</h3>
                    <div class="flex items-center justify-between mt-auto pt-4">
                        <span class="text-red-400 font-semibold text-xl">$3,499</span>
                        <button onclick="addToCart({id: 'obsidian-strat', name: 'The Obsidian Strat', price: 3499, image: 'https://images.unsplash.com/photo-1550291652-6ea9114a47b1?auto=format&fit=crop&q=80'})" class="bg-red-500 text-white px-4 py-2 rounded-full text-xs font-bold uppercase transition-all">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/products.js"></script>
</body>
</html>
