<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[50vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">TRACK <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">ORDER</span></h1>
            <p class="text-white/50 text-xl max-w-2xl mx-auto">Follow your instrument's journey to your doorstep.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12 max-w-7xl mx-auto">
        <div class="max-w-xl mx-auto bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8">
            <form class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold">Order ID</label>
                    <input type="text" placeholder="e.g. ST-12345" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-red-500 transition-colors">
                </div>
                <div class="space-y-2">
                    <label class="text-xs uppercase tracking-widest text-gray-400 font-bold">Billing Email</label>
                    <input type="email" placeholder="Email used at checkout" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-red-500 transition-colors">
                </div>
                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all">Track Instrument</button>
            </form>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
