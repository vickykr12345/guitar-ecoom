<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Dealer | StringTheory Guitars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Lexend'] overflow-x-hidden">
    <div id="header-placeholder"></div>

    <section class="relative min-h-[50vh] flex flex-col items-center justify-center text-center px-6 pt-20 overflow-hidden bg-black">
        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-['Syncopate'] font-bold mb-6 tracking-tighter leading-none">FIND A <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">DEALER</span></h1>
            <p class="text-white/50 text-xl max-w-2xl mx-auto">Experience StringTheory at our premium partners worldwide.</p>
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(220,38,38,0.1),transparent_70%)]"></div>
    </section>

    <section class="py-20 px-6 lg:px-12 max-w-7xl mx-auto text-center">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white/5 border border-white/10 p-8 rounded-2xl">
                <h3 class="text-xl font-bold mb-2">Nashville Flagship</h3>
                <p class="text-gray-400">42 Neon District, Nashville TN</p>
            </div>
            <div class="bg-white/5 border border-white/10 p-8 rounded-2xl">
                <h3 class="text-xl font-bold mb-2">London Custom</h3>
                <p class="text-gray-400">Soho Music Row, London UK</p>
            </div>
            <div class="bg-white/5 border border-white/10 p-8 rounded-2xl">
                <h3 class="text-xl font-bold mb-2">Tokyo Sonic</h3>
                <p class="text-gray-400">Shibuya District, Tokyo JP</p>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer-placeholder"></footer>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
